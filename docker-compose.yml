# Local development / CI convenience — provisions a Postgres instance for
# running integration tests outside of GitHub Actions.
#
# Usage:
#   docker compose up -d
#   DATABASE_URL=postgres://canary:canary@localhost:5432/canary_todos npm run test:integration
#   docker compose down -v
#
# In GitHub Actions, Postgres is provisioned as a native service; this file is
# only needed for local development.

version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: canary
      POSTGRES_PASSWORD: canary
      POSTGRES_DB: canary_todos
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U canary -d canary_todos']
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
