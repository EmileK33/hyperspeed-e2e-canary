version: '3.8'

# Local development / integration-test fixture services.
#
# Usage:
#   docker compose up -d          # start postgres
#   DATABASE_URL=postgres://postgres:postgres@localhost:5432/todos_test npm run test:integration
#   docker compose down           # stop + remove containers
#
# CI provisions Postgres as a native service and exports DATABASE_URL itself;
# this file is only needed for local runs.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: todos_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d todos_test"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
