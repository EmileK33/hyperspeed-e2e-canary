# Local development Postgres for integration tests.
# Start with: docker compose up -d postgres
# Then set: DATABASE_URL=postgres://todos:todos@localhost:5432/todos
version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: todos
      POSTGRES_PASSWORD: todos
      POSTGRES_DB: todos
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U todos -d todos']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
