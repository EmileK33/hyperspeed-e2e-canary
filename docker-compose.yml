# docker-compose.yml — Canary Todos API
#
# This project is a framework-free node:http backend with no external
# dependencies (no database, no cache). The compose file is provided as
# a standard harness artifact; extend it when feature sessions introduce
# infrastructure (e.g., Postgres, Redis).
version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: '3000'
    restart: unless-stopped
