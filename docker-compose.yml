# docker-compose.yml — Canary Todos API + Postgres dev/test environment.
#
# Usage:
#   docker compose up -d        # start services in the background
#   docker compose down -v      # stop and remove volumes
#
# The app service reads DATABASE_URL from its environment; override it
# in a .env file at project root (not committed — see .gitignore).

version: '3.9'

services:
  # ── Application ──────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: development
      PORT: '3000'
      DATABASE_URL: postgres://canary:canary@postgres:5432/canary_todos
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Postgres ─────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: canary
      POSTGRES_PASSWORD: canary
      POSTGRES_DB: canary_todos
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U canary -d canary_todos']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
